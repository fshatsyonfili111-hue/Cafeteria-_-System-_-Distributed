<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="glass-panel-black" style="width: 400px; margin: 50px auto; text-align: center;">
        <h1>Change Password</h1>
        <p>This is your first login. Please update your password.</p>
        <form action="ChangePasswordServlet" method="POST">
            <input type="hidden" name="id" value=""> <!-- We will set this via URL -->
            <label>Current Password:</label> <input type="password" name="oldPassword" required>
            <label>New Password:</label> <input type="password" name="newPassword" required>
            <label>Confirm Password:</label> <input type="password" name="confirmPassword" required>
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>
    <script>
        // Auto-fill the ID from the URL
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementsByName('id')[0].value = urlParams.get('id');
    </script>
</body>
</html>
