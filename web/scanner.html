<!DOCTYPE html>
<html>
<head>
    <title>Cafeteria Scanner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
</head>
<body>

    <!-- Navigation -->
    <div style="text-align:center; margin: 30px 0;">
        <nav class="navbar-pill">
            <a href="face_verify.html" class="nav-link"><i class="fas fa-id-badge"></i> AI Face Verify</a>
            <a href="scanner.html" class="nav-link active"><i class="fas fa-qrcode"></i> QR Scanner</a>
            <a href="DashboardServlet?view=students" class="nav-link" style="margin-left: 20px; opacity: 0.7;"><i class="fas fa-arrow-left"></i> Exit to Dashboard</a>
        </nav>
    </div>

    <h1 style="text-align:center;">Meal Access: <span style="color:var(--accent-primary)">QR Scanner</span></h1>
    
    <div class="camera-container" style="max-width: 500px; margin: auto; border: 5px solid var(--accent-primary); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <video id="video" autoplay style="width: 100%;"></video>
    </div>
    
    <div id="status" style="margin-top:20px; text-align:center; color:var(--accent-primary); font-weight: bold; font-size: 1.2rem;">Waiting for QR Code...</div>
    
    <!-- Manual Entry Section -->
    <div class="glass-panel" style="margin: 30px auto; width: 350px; text-align: center; padding: 20px;">
        <input type="text" id="manualId" placeholder="Enter ID Card Number" style="margin-bottom: 15px; border-color: var(--accent-primary);">
        <button class="btn" onclick="manualEntry()" style="width: 100%;">Verify Access</button>
    </div>
    <div id="result" style="max-width: 500px; margin: auto; padding-bottom: 50px;"></div>
    

    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        let isScanning = true;

        codeReader.decodeFromVideoDevice(undefined, 'video', (result) => {
            if (result && isScanning) {
                isScanning = false;
                processScan(result.getText());
            }
        }).catch(err => console.log(err));

        function processScan(rawId) {
            document.getElementById('status').innerText = "Verifying Student...";
            fetch('ScannerServlet?id=' + encodeURIComponent(rawId))
                .then(response => response.text())
                .then(data => {
                    let resultDiv = document.getElementById('result');
                    let p = data.split("|"); 

                    if(p[0].includes("GRANTED")) {
                        resultDiv.innerHTML = `
                            <div class="glass-panel animate-up" style="border: 2px solid var(--success); text-align:center; background: rgba(16, 185, 129, 0.1);">
                                <div style="color:var(--success); font-weight:bold; font-size: 1.8rem; margin-bottom:15px;">ACCESS GRANTED</div>
                                <img src="${p[2]}" style="width:140px; height:140px; border-radius:50%; margin:10px; border: 4px solid var(--success); object-fit:cover;">
                                <div style="margin-top:20px; font-size:1.1rem;">
                                    <h2 style="color:white; margin-bottom:5px;">${p[1]}</h2>
                                    <p style="color:var(--text-secondary); margin-bottom:5px; font-weight:600;">Department: ${p[3]}</p>
                                    <p style="color:var(--accent-primary);">Student ID: ${p[4]}</p>
                                </div>
                            </div>`;
                        new Audio('success.mp3').play().catch(()=>{});
                    } 
                    else {
                        resultDiv.innerHTML = `
                            <div class="glass-panel animate-up" style="border: 2px solid var(--danger); text-align:center; background: rgba(239, 68, 68, 0.1);">
                                <div style="color:var(--danger); font-weight:bold; font-size: 1.5rem; margin-bottom:15px;">${p[0]}</div>
                                <img src="${p[2] || 'images/default.jpg'}" style="width:120px; height:120px; border-radius:50%; margin:10px; border: 3px solid var(--danger); object-fit:cover;">
                                <div style="margin-top:15px;">
                                    <h3 style="color:white;">${p[1] || "Unknown Student"}</h3>
                                    <p style="color:var(--text-secondary); font-weight:600;">Dept: ${p[3] || "N/A"}</p>
                                    <p style="color:var(--danger);">ID: ${p[4] || "N/A"}</p>
                                </div>
                            </div>`;
                        new Audio('beep.wav').play().catch(()=>{});
                    }
                })
                .catch(err => {
                    new Audio('beep.wav').play().catch(()=>{});
                    document.getElementById('status').innerText = "Network Error!";
                })
                .finally(() => {
                    setTimeout(() => { 
                        isScanning = true; 
                        document.getElementById('status').innerText = "Waiting for QR Code...";
                    }, 4000);
                });
        }

        function manualEntry() {
            let manualId = document.getElementById('manualId').value;
            if (manualId.trim() !== "") {
                isScanning = false;
                processScan(manualId);
                document.getElementById('manualId').value = "";
            }
        }
    </script>
</body>
</html>
