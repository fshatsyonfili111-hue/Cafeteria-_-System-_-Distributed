<!DOCTYPE html>
<html>
<head>
    <title>Menu Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <div style="text-align:center; margin: 30px 0;">
        <nav class="navbar-pill">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="DashboardServlet?view=students" class="nav-link"><i class="fas fa-user-graduate"></i> Students</a>
            <a href="DashboardServlet?view=meals" class="nav-link"><i class="fas fa-utensils"></i> Meal Activity</a>
            <a href="menu_admin.html" class="nav-link active"><i class="fas fa-plus-circle"></i> Add Menu</a>
            <a href="MenuManager?action=list" class="nav-link"><i class="fas fa-calendar-alt"></i> Manage Menu</a>
            <a href="message_admin.html" class="nav-link"><i class="fas fa-bullhorn"></i> Announcements</a>
            <a href="MessageManager?action=list" class="nav-link"><i class="fas fa-history"></i> Msg History</a>
            <a href="DashboardServlet?view=feedback" class="nav-link"><i class="fas fa-comments"></i> Feedback</a>
            <a href="DashboardServlet?view=reports" class="nav-link"><i class="fas fa-chart-bar"></i> Reports</a>
            <a href="index.html" class="nav-link" style="background: rgba(255,0,0,0.15); border-radius: 40px; margin-left: 10px;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <!-- Menu Publishing Form -->
    <div class="glass-panel animate-up" style="max-width: 500px; margin: 20px auto;">
        <h2 style="text-align:center; margin-bottom: 30px;">Publish Weekly Menu</h2>
        
        <form action="MenuPublishServlet" method="POST" enctype="multipart/form-data">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Day of Week:</label>
                    <select name="dayOfWeek">
                        <option value="Monday">Monday (Sanyo)</option>
                        <option value="Tuesday">Tuesday (Maksanyo)</option>
                        <option value="Wednesday">Wednesday (Rob)</option>
                        <option value="Thursday">Thursday (Hamus)</option>
                        <option value="Friday">Friday (Arb)</option>
                        <option value="Saturday">Saturday (Kidame)</option>
                        <option value="Sunday">Sunday (Ehud)</option>
                    </select>
                </div>
                <div>
                    <label>Ethiopian Date (Helper):</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" name="ecDay" placeholder="Day" style="width: 30%;" min="1" max="30">
                        <select name="ecMonth" style="width: 70%;">
                            <option value="">Month (EC)</option>
                            <option>Meskerem</option>
                            <option>Tikimt</option>
                            <option>Hidar</option>
                            <option>Tahsas</option>
                            <option>Tir</option>
                            <option>Yakatit</option>
                            <option>Magabit</option>
                            <option>Miyazya</option>
                            <option>Ginbot</option>
                            <option>Sane</option>
                            <option>Hamle</option>
                            <option>Nehasse</option>
                            <option>Pagume</option>
                        </select>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Meal Type:</label>
                    <select name="mealType">
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch</option>
                        <option value="Dinner">Dinner</option>
                    </select>
                </div>
                <div>
                    <label>Start Time:</label>
                    <input type="time" name="startTime" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>End Time:</label>
                    <input type="time" name="endTime" required>
                </div>
                <div>
                    <label>Food Photo:</label>
                    <input type="file" name="photo" accept="image/*" required>
                </div>
            </div>

            <label>Menu Description:</label>
            <input type="text" name="description" placeholder="e.g. Special Doro Wat with Injera" required>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Broadcast Menu Schedule</button>
        </form>
    </div>

</body>
</html>
